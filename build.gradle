plugins {
    id 'java'
    id 'war'
}

group = 'com.example'
version = '1.0'

repositories {
    mavenCentral()
}

dependencies {
    providedCompile 'javax.servlet:javax.servlet-api:4.0.1'
}

war {
    archiveFileName = 'myapp.war'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}
