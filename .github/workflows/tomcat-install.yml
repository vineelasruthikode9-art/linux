name: Install Tomcat on EC2 (Debug Mode)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Debug EC2_HOST
      - name: Debug EC2_HOST
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "EC2_HOST is EMPTY ❌"
            exit 1
          else
            echo "EC2_HOST is set ✅"
          fi

      # Step 2: Debug EC2_USER
      - name: Debug EC2_USER
        run: |
          if [ -z "${{ secrets.EC2_USER }}" ]; then
            echo "EC2_USER is EMPTY ❌"
            exit 1
          else
            echo "EC2_USER is set ✅"
          fi

      # Step 3: Debug EC2_KEY (length check only, not printing)
      - name: Debug EC2_KEY
        run: |
          echo "${{ secrets.EC2_KEY }}" | wc -l

      # Step 4: SSH into EC2 and run commands
      - name: SSH into EC2 and install Tomcat
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}

          script: |
            echo "Connected to EC2 ✅"

            sudo yum update -y
            sudo yum install -y java-11-amazon-corretto

            cd /opt
            sudo wget https://downloads.apache.org/tomcat/tomcat-9/v9.0.85/bin/apache-tomcat-9.0.85.tar.gz
            sudo tar -xvzf apache-tomcat-9.0.85.tar.gz

            cd apache-tomcat-9.0.85/bin
            sudo chmod +x *.sh
            ./startup.sh
