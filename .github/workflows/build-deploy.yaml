name: Build and Deploy WAR to Tomcat

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Gradle
        run: |
          sudo apt update
          sudo apt install -y gradle

      - name: Build WAR
        run: gradle clean war

      - name: Check WAR output
        run: ls -lh build/libs

      - name: Copy WAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.war"
          target: "/tmp/"
          debug: true

      - name: Deploy WAR and Restart Tomcat
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Cleaning old deployment..."
            sudo rm -rf /opt/apache-tomcat-9.0.85/webapps/myapp
            sudo rm -f /opt/apache-tomcat-9.0.85/webapps/myapp.war

            echo "Copying WAR from /tmp/build/libs to Tomcat webapps..."
            sudo cp /tmp/build/libs/*.war /opt/apache-tomcat-9.0.85/webapps/myapp.war

            echo "Restarting Tomcat..."
            cd /opt/apache-tomcat-9.0.85/bin
            ./shutdown.sh || true
            sleep 5
            ./startup.sh

            echo "Waiting for deployment..."
            sleep 10

            echo "Deployment completed ✅"
            ls -lh /opt/apache-tomcat-9.0.85/webapps
